name: MemGraph RealMemBench

on:
  workflow_dispatch:
    inputs:
      persona:
        description: 'Select persona to benchmark'
        required: true
        type: choice
        options:
          - Lin_Wanyu
          - Adeleke_Okonjo
          - Ethan_Hunt
          - Kenta_Tanaka
          - Kim_Ji_young
          - Liam_O_Connor
          - Oliver_Smith
          - Pak_Budi
          - Sarah_Miller
          - Sophie_Dubois
        default: 'Lin_Wanyu'
      mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - compare
          - single
        default: 'compare'
      activator:
        description: 'Activator (only for single mode)'
        required: false
        type: choice
        options:
          - attention
          - mem0
          - summary
        default: 'attention'
      sessions:
        description: 'Limit sessions (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ---------- Single mode: one job ----------
  single:
    if: github.event.inputs.mode == 'single'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    name: "${{ github.event.inputs.persona }} × ${{ github.event.inputs.activator }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          ACT="${{ github.event.inputs.activator }}"
          SESSIONS="${{ github.event.inputs.sessions }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT="tests/benchmark/benchmark_${ACT}_${PERSONA}_${TIMESTAMP}.json"

          CMD="python -m tests.benchmark.run_realmem_benchmark --activator ${ACT} --static --persona ${PERSONA} --output ${OUTPUT}"
          [ -n "$SESSIONS" ] && CMD="$CMD --limit-sessions ${SESSIONS}"

          echo "Running: $CMD"
          $CMD
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "benchmark-${{ github.event.inputs.activator }}-${{ github.event.inputs.persona }}"
          path: tests/benchmark/benchmark_*_${{ github.event.inputs.persona }}_*.json
          retention-days: 90

  # ---------- Compare mode: parallel jobs ----------
  bench-attention:
    if: github.event.inputs.mode == 'compare'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    name: "${{ github.event.inputs.persona }} × attention"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run attention benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          SESSIONS="${{ github.event.inputs.sessions }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT="tests/benchmark/benchmark_attention_${PERSONA}_${TIMESTAMP}.json"

          CMD="python -m tests.benchmark.run_realmem_benchmark --activator attention --static --persona ${PERSONA} --output ${OUTPUT}"
          [ -n "$SESSIONS" ] && CMD="$CMD --limit-sessions ${SESSIONS}"

          echo "Running: $CMD"
          $CMD
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "benchmark-attention-${{ github.event.inputs.persona }}"
          path: tests/benchmark/benchmark_attention_${{ github.event.inputs.persona }}_*.json
          retention-days: 90

  bench-mem0:
    if: github.event.inputs.mode == 'compare'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    name: "${{ github.event.inputs.persona }} × mem0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run mem0 benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          SESSIONS="${{ github.event.inputs.sessions }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT="tests/benchmark/benchmark_mem0_${PERSONA}_${TIMESTAMP}.json"

          CMD="python -m tests.benchmark.run_realmem_benchmark --activator mem0 --static --persona ${PERSONA} --output ${OUTPUT}"
          [ -n "$SESSIONS" ] && CMD="$CMD --limit-sessions ${SESSIONS}"

          echo "Running: $CMD"
          $CMD
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "benchmark-mem0-${{ github.event.inputs.persona }}"
          path: tests/benchmark/benchmark_mem0_${{ github.event.inputs.persona }}_*.json
          retention-days: 90

  bench-summary:
    if: github.event.inputs.mode == 'compare'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    name: "${{ github.event.inputs.persona }} × summary"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Run summary benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          SESSIONS="${{ github.event.inputs.sessions }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT="tests/benchmark/benchmark_summary_${PERSONA}_${TIMESTAMP}.json"

          CMD="python -m tests.benchmark.run_realmem_benchmark --activator summary --static --persona ${PERSONA} --output ${OUTPUT}"
          [ -n "$SESSIONS" ] && CMD="$CMD --limit-sessions ${SESSIONS}"

          echo "Running: $CMD"
          $CMD
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "benchmark-summary-${{ github.event.inputs.persona }}"
          path: tests/benchmark/benchmark_summary_${{ github.event.inputs.persona }}_*.json
          retention-days: 90

  # ---------- Collect results after all parallel jobs ----------
  collect:
    if: github.event.inputs.mode == 'compare' && always()
    needs: [bench-attention, bench-mem0, bench-summary]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: "Collect & commit results"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          pattern: "benchmark-*-${{ github.event.inputs.persona }}"
          path: tests/benchmark/
          merge-multiple: true

      - name: Generate summary
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          echo "## RealMemBench: ${PERSONA}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Activator | Recall | Queries |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*_${PERSONA}_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data if isinstance(data, list) else data.get('results', [])
                  if results:
                      recall = sum(r.get('recall', 0) for r in results) / len(results)
                      print(f'| {activator} | {recall:.1%} | {len(results)} |')
              except Exception as e:
                  print(f'| {activator} | ERROR | - |')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Token Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Activator | Encode In | Encode Out | Judge In | Judge Out | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|-----------|---------|----------|-------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*_${PERSONA}_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data if isinstance(data, list) else data.get('results', [])
                  enc_in = max((r.get('encode_usage_snapshot', {}).get('input_tokens', 0) for r in results), default=0)
                  enc_out = max((r.get('encode_usage_snapshot', {}).get('output_tokens', 0) for r in results), default=0)
                  jdg_in = sum(r.get('judge_usage', {}).get('input_tokens', 0) for r in results)
                  jdg_out = sum(r.get('judge_usage', {}).get('output_tokens', 0) for r in results)
                  total = enc_in + enc_out + jdg_in + jdg_out
                  print(f'| {activator} | {enc_in:,} | {enc_out:,} | {jdg_in:,} | {jdg_out:,} | {total:,} |')
              except: print(f'| {activator} | - | - | - | - | - |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Commit results to main
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          if ls tests/benchmark/benchmark_*_${PERSONA}_*.json 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            mkdir -p benchmark_reports

            REPORT="benchmark_reports/${PERSONA}_$(date +%Y%m%d_%H%M%S).md"

            echo "# ${PERSONA} — Run #${GITHUB_RUN_NUMBER}" > "$REPORT"
            echo "" >> "$REPORT"
            echo "- **Date:** ${TIMESTAMP}" >> "$REPORT"
            echo "- **Run URL:** https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$REPORT"
            echo "- **Commit:** ${GITHUB_SHA}" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| Activator | Recall | Queries |" >> "$REPORT"
            echo "|-----------|--------|---------|" >> "$REPORT"

            python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*_${PERSONA}_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data if isinstance(data, list) else data.get('results', [])
                  if results:
                      recall = sum(r.get('recall', 0) for r in results) / len(results)
                      print(f'| {activator} | {recall:.1%} | {len(results)} |')
              except: print(f'| {activator} | ERROR | - |')
          " >> "$REPORT"

            git add tests/benchmark/benchmark_*_${PERSONA}_*.json benchmark_reports/
            git commit -m "ci: ${PERSONA} benchmark results [skip ci]" || echo "Nothing to commit"

            for i in 1 2 3 4 5; do
              if git push; then
                echo "✅ Push succeeded (attempt $i)"
                break
              else
                echo "⚠️ Push failed (attempt $i), pulling with rebase..."
                sleep $((i * 10))
                git pull --rebase origin main
              fi
            done
          fi
