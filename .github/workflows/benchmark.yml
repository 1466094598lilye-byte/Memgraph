name: MemGraph RealMemBench

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: compare (all activators) or single'
        required: false
        default: 'compare'
      persona:
        description: 'Persona name (default: Lin_Wanyu, use ALL for all personas)'
        required: false
        default: 'Lin_Wanyu'
      activator:
        description: 'Activator (only for single mode): attention/mem0/summary/h2o/full_context/layered'
        required: false
        default: 'attention'
      sessions:
        description: 'Limit sessions per persona (empty = all)'
        required: false
        default: ''

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: .
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify import
        working-directory: .
        run: |
          python -c "from memgraph import MemGraph; print('✅ import OK')"

      - name: Run benchmark
        working-directory: .
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          MODE="${{ github.event.inputs.mode || 'compare' }}"
          PERSONA="${{ github.event.inputs.persona }}"
          SESSIONS="${{ github.event.inputs.sessions }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          echo "=================================="
          echo "MemGraph RealMemBench"
          echo "=================================="
          echo "Mode:      ${MODE}"
          echo "Persona:   ${PERSONA:-ALL}"
          echo "Sessions:  ${SESSIONS:-all}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Python:    $(python --version)"
          echo "=================================="

          if [ "$MODE" = "compare" ]; then
            ACTIVATORS="attention mem0 summary"
          else
            ACTIVATORS="${{ github.event.inputs.activator || 'attention' }}"
          fi

          for ACT in $ACTIVATORS; do
            echo ""
            echo "========================================="
            echo "  Running activator: ${ACT}"
            echo "========================================="
            echo ""

            OUTPUT="tests/benchmark/benchmark_${ACT}_${TIMESTAMP}.json"

            CMD="python -m tests.benchmark.run_realmem_benchmark"
            CMD="$CMD --activator ${ACT}"
            CMD="$CMD --static"
            CMD="$CMD --output ${OUTPUT}"

            if [ "$PERSONA" != "ALL" ] && [ -n "$PERSONA" ]; then
              CMD="$CMD --persona ${PERSONA}"
            fi

            if [ -n "$SESSIONS" ]; then
              CMD="$CMD --limit-sessions ${SESSIONS}"
            fi

            echo "Running: $CMD"
            $CMD || echo "⚠️ ${ACT} failed with exit code $?"
            echo ""
          done

      - name: Generate comparison summary
        if: always()
        working-directory: .
        run: |
          echo "## MemGraph RealMemBench Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Activator | Overall Recall | Total Queries | Total GT Memories |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------------|---------------|-------------------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          import json, glob, os

          files = sorted(glob.glob('tests/benchmark/benchmark_*.json'))
          for f in files:
              name = os.path.basename(f)
              # Extract activator name from filename
              parts = name.replace('benchmark_', '').split('_')
              # activator is everything before the timestamp (last 2 parts: date_time.json)
              activator = '_'.join(parts[:-2]) if len(parts) > 2 else parts[0]

              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  recall = data.get('overall_recall', 'N/A')
                  if isinstance(recall, float):
                      recall = f'{recall:.1%}'
                  queries = data.get('total_queries', 'N/A')
                  gt = data.get('total_gt_memories', 'N/A')
                  print(f'| {activator} | {recall} | {queries} | {gt} |')
              except Exception as e:
                  print(f'| {activator} | ERROR | - | - |')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Token usage comparison
          echo "### Token Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Activator | Encode Input | Encode Output | Judge Input | Judge Output | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------------|--------------|------------|-------------|-------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = '_'.join(parts[:-2]) if len(parts) > 2 else parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data.get('results', [])
                  enc_in = sum(r.get('encode_usage_snapshot', {}).get('input_tokens', 0) for r in results)
                  enc_out = sum(r.get('encode_usage_snapshot', {}).get('output_tokens', 0) for r in results)
                  jdg_in = sum(r.get('judge_usage', {}).get('input_tokens', 0) for r in results)
                  jdg_out = sum(r.get('judge_usage', {}).get('output_tokens', 0) for r in results)
                  total = enc_in + enc_out + jdg_in + jdg_out
                  print(f'| {activator} | {enc_in:,} | {enc_out:,} | {jdg_in:,} | {jdg_out:,} | {total:,} |')
              except: print(f'| {activator} | - | - | - | - | - |')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Detailed per-activator breakdown
          for f in tests/benchmark/benchmark_*.json; do
            if [ -f "$f" ]; then
              echo "### $(basename $f)" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              python3 -c "
          import json, sys
          with open('$f') as fp:
              data = json.load(fp)
          summary = {k: data[k] for k in ['overall_recall','total_queries','total_gt_memories','by_category','by_topic'] if k in data}
          json.dump(summary, sys.stdout, indent=2, ensure_ascii=False)
          " 2>/dev/null || echo "Failed to parse"
              echo '' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo '' >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: tests/benchmark/benchmark_*.json
          retention-days: 90

      - name: Commit results to main
        if: success()
        run: |
          # Check if there are new result files to commit
          if ls tests/benchmark/benchmark_*.json 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            
            # Generate a run report
            mkdir -p benchmark_reports
            REPORT="benchmark_reports/run_${GITHUB_RUN_NUMBER}_$(date +%Y%m%d_%H%M%S).md"
            
            echo "# Benchmark Run #${GITHUB_RUN_NUMBER}" > "$REPORT"
            echo "" >> "$REPORT"
            echo "- **Date:** ${TIMESTAMP}" >> "$REPORT"
            echo "- **Commit:** ${GITHUB_SHA}" >> "$REPORT"
            echo "- **Run URL:** https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$REPORT"
            echo "- **Triggered by:** ${GITHUB_ACTOR}" >> "$REPORT"
            echo "- **Mode:** ${{ github.event.inputs.mode || 'compare' }}" >> "$REPORT"
            echo "- **Persona:** ${{ github.event.inputs.persona || 'ALL' }}" >> "$REPORT"
            echo "- **Sessions:** ${{ github.event.inputs.sessions || 'all' }}" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "## Results" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| Activator | Overall Recall | Queries | GT Memories |" >> "$REPORT"
            echo "|-----------|---------------|---------|-------------|" >> "$REPORT"
            
            python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = '_'.join(parts[:-2]) if len(parts) > 2 else parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  recall = data.get('overall_recall', 'N/A')
                  if isinstance(recall, float): recall = f'{recall:.1%}'
                  queries = data.get('total_queries', 'N/A')
                  gt = data.get('total_gt_memories', 'N/A')
                  print(f'| {activator} | {recall} | {queries} | {gt} |')
              except: print(f'| {activator} | ERROR | - | - |')
          " >> "$REPORT"
            
            echo "" >> "$REPORT"
            echo "## Detail" >> "$REPORT"
            echo "" >> "$REPORT"
            for f in tests/benchmark/benchmark_*.json; do
              echo "### $(basename $f)" >> "$REPORT"
              echo '```json' >> "$REPORT"
              python3 -c "
          import json, sys
          with open('$f') as fp: data = json.load(fp)
          summary = {k: data[k] for k in ['overall_recall','total_queries','total_gt_memories','by_category','by_topic'] if k in data}
          json.dump(summary, sys.stdout, indent=2, ensure_ascii=False)
          " >> "$REPORT" 2>/dev/null
              echo '' >> "$REPORT"
              echo '```' >> "$REPORT"
              echo '' >> "$REPORT"
            done
            
            git add tests/benchmark/benchmark_*.json benchmark_reports/
            git commit -m "ci: benchmark run #${GITHUB_RUN_NUMBER} results [skip ci]"
            git push
          else
            echo "No benchmark result files found, skipping commit"
          fi
