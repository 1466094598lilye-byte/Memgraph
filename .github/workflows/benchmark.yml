name: MemGraph RealMemBench

on:
  workflow_dispatch:
    inputs:
      persona:
        description: 'Select persona to benchmark'
        required: true
        type: choice
        options:
          - Lin_Wanyu
          - Adeleke_Okonjo
          - Ethan_Hunt
          - Kenta_Tanaka
          - Kim_Ji_young
          - Liam_O_Connor
          - Oliver_Smith
          - Pak_Budi
          - Sarah_Miller
          - Sophie_Dubois
        default: 'Lin_Wanyu'
      mode:
        description: 'Run mode'
        required: true
        type: choice
        options:
          - compare
          - single
        default: 'compare'
      activator:
        description: 'Activator (only for single mode)'
        required: false
        type: choice
        options:
          - attention
          - mem0
          - summary
          - h2o
          - full_context
          - layered
        default: 'attention'
      sessions:
        description: 'Limit sessions (empty = all)'
        required: false
        default: ''

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    name: "${{ github.event.inputs.persona }} × ${{ github.event.inputs.mode }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify import
        run: |
          python -c "from memgraph import MemGraph; print('✅ import OK')"

      - name: Run benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          MODE="${{ github.event.inputs.mode }}"
          SESSIONS="${{ github.event.inputs.sessions }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          echo "=================================="
          echo "MemGraph RealMemBench"
          echo "=================================="
          echo "Persona:   ${PERSONA}"
          echo "Mode:      ${MODE}"
          echo "Sessions:  ${SESSIONS:-all}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=================================="

          if [ "$MODE" = "compare" ]; then
            ACTIVATORS="attention mem0 summary"
          else
            ACTIVATORS="${{ github.event.inputs.activator }}"
          fi

          for ACT in $ACTIVATORS; do
            echo ""
            echo "========================================="
            echo "  Activator: ${ACT} | Persona: ${PERSONA}"
            echo "========================================="

            OUTPUT="tests/benchmark/benchmark_${ACT}_${PERSONA}_${TIMESTAMP}.json"

            CMD="python -m tests.benchmark.run_realmem_benchmark"
            CMD="$CMD --activator ${ACT}"
            CMD="$CMD --static"
            CMD="$CMD --persona ${PERSONA}"
            CMD="$CMD --output ${OUTPUT}"

            if [ -n "$SESSIONS" ]; then
              CMD="$CMD --limit-sessions ${SESSIONS}"
            fi

            echo "Running: $CMD"
            $CMD || echo "⚠️ ${ACT} failed with exit code $?"

            if [ -f "$OUTPUT" ]; then
              QUERIES=$(python3 -c "import json; d=json.load(open('$OUTPUT')); print(len(d) if isinstance(d,list) else len(d.get('results',[])))")
              echo "✅ Saved: ${OUTPUT} (${QUERIES} queries)"
            fi
            echo ""
          done

      - name: Generate summary
        if: always()
        run: |
          echo "## RealMemBench: ${{ github.event.inputs.persona }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Activator | Recall | Queries |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*_${{ github.event.inputs.persona }}_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data if isinstance(data, list) else data.get('results', [])
                  if results:
                      recall = sum(r.get('recall', 0) for r in results) / len(results)
                      print(f'| {activator} | {recall:.1%} | {len(results)} |')
              except Exception as e:
                  print(f'| {activator} | ERROR | - |')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Token Usage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Activator | Encode In | Encode Out | Judge In | Judge Out | Total |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|-----------|---------|----------|-------|" >> $GITHUB_STEP_SUMMARY

          python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*_${{ github.event.inputs.persona }}_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data if isinstance(data, list) else data.get('results', [])
                  enc_in = sum(r.get('encode_usage_snapshot', {}).get('input_tokens', 0) for r in results)
                  enc_out = sum(r.get('encode_usage_snapshot', {}).get('output_tokens', 0) for r in results)
                  jdg_in = sum(r.get('judge_usage', {}).get('input_tokens', 0) for r in results)
                  jdg_out = sum(r.get('judge_usage', {}).get('output_tokens', 0) for r in results)
                  total = enc_in + enc_out + jdg_in + jdg_out
                  print(f'| {activator} | {enc_in:,} | {enc_out:,} | {jdg_in:,} | {jdg_out:,} | {total:,} |')
              except: print(f'| {activator} | - | - | - | - | - |')
          " >> $GITHUB_STEP_SUMMARY

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "benchmark-${{ github.event.inputs.persona }}"
          path: tests/benchmark/benchmark_*_${{ github.event.inputs.persona }}_*.json
          retention-days: 90

      - name: Commit results to main
        if: always()
        run: |
          PERSONA="${{ github.event.inputs.persona }}"
          if ls tests/benchmark/benchmark_*_${PERSONA}_*.json 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            mkdir -p benchmark_reports

            REPORT="benchmark_reports/${PERSONA}_$(date +%Y%m%d_%H%M%S).md"

            echo "# ${PERSONA} — Run #${GITHUB_RUN_NUMBER}" > "$REPORT"
            echo "" >> "$REPORT"
            echo "- **Date:** ${TIMESTAMP}" >> "$REPORT"
            echo "- **Run URL:** https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$REPORT"
            echo "- **Commit:** ${GITHUB_SHA}" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "| Activator | Recall | Queries |" >> "$REPORT"
            echo "|-----------|--------|---------|" >> "$REPORT"

            python3 -c "
          import json, glob, os
          for f in sorted(glob.glob('tests/benchmark/benchmark_*_${PERSONA}_*.json')):
              name = os.path.basename(f)
              parts = name.replace('benchmark_', '').split('_')
              activator = parts[0]
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                  results = data if isinstance(data, list) else data.get('results', [])
                  if results:
                      recall = sum(r.get('recall', 0) for r in results) / len(results)
                      print(f'| {activator} | {recall:.1%} | {len(results)} |')
              except: print(f'| {activator} | ERROR | - |')
          " >> "$REPORT"

            git add tests/benchmark/benchmark_*_${PERSONA}_*.json benchmark_reports/
            git commit -m "ci: ${PERSONA} benchmark results [skip ci]" || echo "Nothing to commit"
            git push || echo "Push failed"
          fi
