# [CHECKPOINT: task-decomposer]
# 需求摘要: MemGraph Phase 2 - 三层记忆架构 + 向量激活
# 总任务数: 6
# 外部依赖: sentence-transformers, Python 3.10, ANTHROPIC/OPENAI API Key

task_list:
  - id: 1
    title: "models.py: 新增 Layer 枚举，Node 新增 layer/activation_count/last_activated_turn"
    status: pending
    complexity: simple
    priority: 1
    dependencies: []
    success_criteria:
      hard_pass:
        - "Layer 枚举包含 MEMORY, ANCHOR, STABLE"
        - "Node 有 layer, activation_count, last_activated_turn 字段"
        - "python -c \"from memgraph.models import Node, Layer; n=Node(id='1',type='intent',value='x',turn=0); assert n.layer.value=='memory'\" 无报错"
      verify_command: "cd /Users/lilysmac/memgraph && PYTHONPATH=/Users/lilysmac/memgraph python3 -c \"from memgraph.models import Node, Layer; n=Node(id='1',type='intent',value='x',turn=0); assert n.layer.value=='memory' and n.activation_count==0; print('OK')\""
    auth_required: []
    final_verification:
      method: script
      command: "cd /Users/lilysmac/memgraph && python3 -c \"from memgraph.models import *; print('Models OK')\""
      expect: "输出 Models OK"

  - id: 2
    title: "requirements.txt: 添加 sentence-transformers"
    status: pending
    complexity: simple
    priority: 2
    dependencies: []
    success_criteria:
      hard_pass:
        - "requirements.txt 包含 sentence-transformers"
        - "pip install sentence-transformers 后可 import"
      verify_command: "cd /Users/lilysmac/memgraph && pip3 install sentence-transformers -q 2>/dev/null; python3 -c \"from sentence_transformers import SentenceTransformer; print('OK')\""
    auth_required: []
    final_verification:
      method: script
      command: "pip3 install sentence-transformers -q && python3 -c \"from sentence_transformers import SentenceTransformer; print('OK')\""
      expect: "输出 OK"

  - id: 3
    title: "embedder.py: 实现 sentence-transformers 向量化（embed_node, embed_query）"
    status: pending
    complexity: simple
    priority: 3
    dependencies: [2]
    success_criteria:
      hard_pass:
        - "Embedder.embed_node(node) 返回 embedding 非空的 Node"
        - "Embedder.embed_query(query) 返回 list[float]"
        - "使用 paraphrase-multilingual-MiniLM-L12-v2 模型"
      verify_command: "cd /Users/lilysmac/memgraph && PYTHONPATH=/Users/lilysmac/memgraph python3 -c \"from memgraph.embedder import Embedder; from memgraph.models import Node, NodeType; e=Embedder(); n=Node(id='1',type=NodeType.INTENT,value='x',turn=0); n2=e.embed_node(n); assert n2.embedding is not None; q=e.embed_query('test'); assert isinstance(q, list); print('OK')\""
    auth_required: []
    final_verification:
      method: script
      command: "cd /Users/lilysmac/memgraph && python3 -c \"from memgraph.embedder import Embedder; e=Embedder(); print(len(e.embed_query('test'))); print('OK')\""
      expect: "输出向量维度数字和 OK"

  - id: 4
    title: "graph.py: 重构为 nodes dict + 实现 promote_nodes/decay_nodes/get_neighbors/compute_importance"
    status: pending
    complexity: complex
    priority: 4
    dependencies: [1]
    success_criteria:
      hard_pass:
        - "GraphStore 内部 nodes 为 dict[id->Node]"
        - "promote_nodes(current_turn) 可调用"
        - "decay_nodes(current_turn) 可调用"
        - "get_neighbors(node_id) 返回邻居 id 列表"
        - "inspect() 返回的 nodes 含 layer, activation_count"
      verify_command: "cd /Users/lilysmac/memgraph && PYTHONPATH=/Users/lilysmac/memgraph python3 -c \"from memgraph.graph import GraphStore; from memgraph.models import Node, NodeType, Layer; g=GraphStore(); n=Node(id='1',type=NodeType.INTENT,value='x',turn=0); g.add_node(n); g.promote_nodes(0); g.decay_nodes(0); d=g.inspect(); assert 'layer' in d['nodes'][0]; print('OK')\""
    auth_required: []
    final_verification:
      method: script
      command: "cd /Users/lilysmac/memgraph && python3 -c \"from memgraph.graph import GraphStore; g=GraphStore(); print(g.inspect()); print('OK')\""
      expect: "输出 dict 含 nodes/edges"

  - id: 5
    title: "activator.py: 实现向量激活（语义锚点→结构扩散→重排序）"
    status: pending
    complexity: complex
    priority: 5
    dependencies: [3, 4]
    success_criteria:
      hard_pass:
        - "Activator(embedder) 依赖 Embedder"
        - "activate(graph, query, current_turn, top_k) 返回按相关性筛选的节点文本"
        - "格式为 [layer][type] value"
        - "激活后更新 activation_count, last_activated_turn"
      verify_command: "cd /Users/lilysmac/memgraph && PYTHONPATH=/Users/lilysmac/memgraph python3 -c \"
from memgraph.embedder import Embedder
from memgraph.graph import GraphStore
from memgraph.activator import Activator
from memgraph.models import Node, NodeType
e=Embedder()
g=GraphStore()
n=Node(id='1',type=NodeType.INTENT,value='RPG应用',turn=0)
n=e.embed_node(n)
g.add_node(n)
a=Activator(e)
r=a.activate(g,'应用叫什么',0,top_k=5)
assert 'RPG' in r or '应用' in r
assert '[memory]' in r or '[anchor]' in r
print('OK')
\""
    auth_required: []
    final_verification:
      method: script
      command: "cd /Users/lilysmac/memgraph && python3 -c \"from memgraph.activator import Activator; from memgraph.embedder import Embedder; print('Activator OK')\""
      expect: "输出 Activator OK"

  - id: 6
    title: "core.py: 更新 encode/activate，集成 embed + 传入 current_turn"
    status: pending
    complexity: simple
    priority: 6
    dependencies: [4, 5]
    success_criteria:
      hard_pass:
        - "encode 时对新节点调用 embedder.embed_node"
        - "activate 传入 current_turn"
        - "跨轮一致性与激活相关性由 RealMem / 人工 E2E 验收"
      verify_command: "cd /Users/lilysmac/memgraph && PYTHONPATH=/Users/lilysmac/memgraph python3 -c \"from memgraph import MemGraph; print('MemGraph OK')\""
    auth_required:
      - type: api_key
        name: ANTHROPIC_API_KEY
        check_command: "echo $ANTHROPIC_API_KEY | head -c 5"
        expected_output: "sk-an"
    final_verification:
      method: script
      command: "cd /Users/lilysmac/memgraph && PYTHONPATH=/Users/lilysmac/memgraph python -m tests.benchmark.run_realmem_benchmark --dry-run"
      expect: "dry-run 正常；完整行为请跑 RealMem 或按项目验收清单手动对话验证"
